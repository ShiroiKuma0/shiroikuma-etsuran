<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="underlineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="#f0fdf4"/>

  <!-- Decorative dots -->
  <circle cx="120" cy="90" r="5" fill="#F59E0B" opacity="0.7" />
  <circle cx="680" cy="210" r="6" fill="#EC4899" opacity="0.7" />
  <circle cx="700" cy="110" r="4" fill="#8B5CF6" opacity="0.7" />
  <circle cx="150" cy="230" r="5" fill="#10B981" opacity="0.6" />
  <circle cx="650" cy="80" r="4" fill="#F59E0B" opacity="0.6" />
  <circle cx="90" cy="180" r="3" fill="#EC4899" opacity="0.5" />
  <circle cx="720" cy="170" r="5" fill="#8B5CF6" opacity="0.6" />

  <!-- Single-stroke 白い熊 書籍閲覧 icon motif: book + bookmark + play badge -->
  <g stroke="#10B981" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- book cover (open where the play badge overlaps) -->
    <path d="M 426 121 L 426 73 Q 426 55 408 55 L 348 55 Q 330 55 330 73 L 330 163 Q 330 181 348 181 L 394 181" />

    <!-- bookmark ribbon -->
    <path d="M 360 55 L 360 97 L 375 85 L 390 97 L 390 55" />

    <!-- play badge circle -->
    <path d="M 390 163 A 42 42 0 1 1 474 163 A 42 42 0 1 1 390 163" />

    <!-- play triangle -->
    <path d="M 418 144 L 456 163 L 418 182 Z" />
  </g>

  <!-- Decorative underline -->
  <path
    d="M 180 200 Q 400 220 620 200"
    stroke="#EC4899"
    stroke-width="3"
    fill="none"
    opacity="0.6"
    stroke-linecap="round"
  />
</svg>